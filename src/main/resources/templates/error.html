<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Error</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

<h2>Error</h2>

<h3 th:text="${error}"></h3>

<div th:if="${errors!=null}">

<table>

<tr>

<th>Field</th>

<th>Message</th>

</tr>

<tr th:each="e : ${errors}">

<td th:text="${e.key}"></td>

<td th:text="${e.value}"></td>

</tr>

</table>

</div>

<br>

<a th:href="@{/employees/list}">

<button>Back</button>

</a>

</div>

</body>

</html>
