<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Add Employee</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body>


<!-- Common Header -->
<div th:replace="~{fragments/header :: header}"></div>



<div class="content">


<div class="form-card">


<h2>
<i class="fas fa-user-plus"></i>
Add Employee
</h2>



<form th:action="@{/employees/save}"
      th:object="${employee}"
      method="post">



<label>Name</label>

<input type="text"
       th:field="*{name}"
       required>



<label>Email</label>

<input type="email"
       th:field="*{email}"
       required>



<label>Phone</label>

<input type="number"
       th:field="*{phone}"
       required>



<label>Department</label>

<input type="text"
       th:field="*{department}"
       required>



<label>Designation</label>

<input type="text"
       th:field="*{designation}"
       required>



<label>Salary</label>

<input type="number"
       th:field="*{salary}"
       required>



<label>Joining Date</label>

<input type="date"
       th:field="*{joiningDate}"
       required>



<label>Status</label>


<select th:field="*{status}">

<option value="Active">
Active
</option>

<option value="Inactive">
Inactive
</option>

</select>



<button type="submit" class="save-btn">

<i class="fas fa-save"></i>
Save Employee

</button>



</form>


</div>


</div>


</body>

</html>
